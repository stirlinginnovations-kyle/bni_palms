[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200

[[redirects]]
  from = "/analytics"
  to = "/static/analytics.html"
  status = 200

[[redirects]]
  from = "/pin-settings"
  to = "/static/pin-settings.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/static/login.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://bni-palms-api.onrender.com/api/:splat"
  status = 200
  force = true
