[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  # Use the more compatible JavaScript bundler for server-only deps (pdf/xlsx).
  node_bundler = "zisi"

[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200

[[redirects]]
  from = "/analytics"
  to = "/static/analytics.html"
  status = 200

[[redirects]]
  from = "/pin-settings"
  to = "/static/pin-settings.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/static/login.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
